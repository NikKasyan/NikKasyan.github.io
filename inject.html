<script>
    const webSocket = new WebSocket('ws://{{address}}');
    /**
     * @param {string} reloadedFile
     */
    async function reloadHtml() {
        const htmlContent = await fetch(location.href).then((response) => response.text());
        // Slightly cheating, but it works
        const oldOnLoad = document.body.onload;
        document.documentElement.innerHTML = htmlContent;
        oldOnLoad();
        //Todo: Check if every tag has a dynamically added event listener and re-add it
    }

    /**
     * @param {MessageEvent} event
     */
    async function onMessage(event) {
        const reloadedFiles = event.data.split(' ');
        if (reloadedFiles.includes("index.html")) {
                reloadHtml();
            return;
        }
        for (let reloadedFile of reloadedFiles) {
            if (reloadedFile === "home.html")
                reloadedFile = "index.html";

            if (reloadedFile.endsWith(".css"))
                reloadCSS(reloadedFile);
            else if (reloadedFile.endsWith(".html") && window.location.href.includes(reloadedFile)) {
                reloadHtml();
                return;
            } else if(reloadedFile.endsWith(".js")){
                reloadHtml();
                return;
            }

        }
    };

    webSocket.onmessage = onMessage;

    /**
     * @param {string} cssFile
     */
    function reloadCSS(cssFile) {
        // Get every link with same css file
        const links = document.querySelectorAll('link[rel="stylesheet"]');



        document.querySelectorAll('link[rel="stylesheet"]').forEach((link) => {
            if (link.href.includes(cssFile)) {
                const newNode = link.cloneNode();
                newNode.href = `${cssFile}?v=${new Date().getTime()}`
                link.after(newNode);
                newNode.onload = () => {
                    link.remove();
                }
            }
        });
    }
</script>
